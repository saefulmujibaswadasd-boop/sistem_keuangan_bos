<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siplah - SD Negeri Wonokerto</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="assets/favicon.png" type="image/png">
</head>
<body class="w-full bg-gray-100 min-h-screen text-white">

  <!-- Header -->
   <header class="w-full h-40 py-3 bg-gradient-to-r from-green-800 via-red-500 to-green-800 shadow-lg rounded-b-1xl">
    <!-- Logo sejajar -->
    <div class="flex justify-center items-center space-x-2">
      <img src="assets/logo_pemkab.png" alt="Logo Pemkab" class="w-12 h-12 object-contain">
      <img src="assets/logo_tutwuri.png" alt="Tutwuri" class="w-12 h-12 object-contain">
      <img src="assets/logo_kurikulum_merdeka.png" alt="Kurikulum" class="w-12 h-12 object-contain">
      <img src="assets/logo_ramah.png" alt="Ramah" class="w-12 h-12 object-contain">
      <img src="assets/logo_sekolah.png" alt="Logo Sekolah" class="w-12 h-12 object-contain">
    </div>
    <h1 class="text-2xl md:text-3xl py-12 font-extrabold text-gray-300 tracking-wide text-center">
      SIPLAH SD NEGERI WONOKERTO
    </h1>
  </header>
 
  <section id="laporan-siplah" class="mt-6">
 <h1 class="text-lg font-bold mt-6 mb-2 text-green-800">Ringkasan Per Triwulan</h1>
   <table class="table-auto border-collapse border border-gray-500 w-full text-sm text-white">
    <thead class="bg-green-800 text-white font-bold">
      <tr>
        <th class="border border-gray-500 px-2 py-1">No</th>
        <th class="border border-gray-500 px-2 py-1">Triwulan</th>
        <th class="border border-gray-500 px-2 py-1">Total Realisasi</th>
        <th class="border border-gray-500 px-2 py-1">Total Terhutang</th>
        <th class="border border-gray-500 px-2 py-1">Total saldo</th>
      </tr>
    </thead>
    <tbody id="laporanSiplah" class="text-white"></tbody>
  </table>
    <!-- Judul di antara tabel -->
  <h2 class="text-lg font-bold mt-6 mb-2 text-green-800">Tabel Laporan Siplah</h2>
  <table class="table-auto border-collapse border border-gray-500 w-full text-sm text-white">
      <thead class="bg-green-800 text-white font-bold">
      <tr>
        <th class="border border-gray-500 px-2 py-1">No</th>
        <th class="border border-gray-500 px-2 py-1">Uraian</th>
        <th class="border border-gray-500 px-2 py-1">Jumlah</th>
        <th class="border border-gray-500 px-2 py-1">Kategori</th>
        <th class="border border-gray-500 px-2 py-1">Saldo</th>
        <th class="border border-gray-500 px-2 py-1">Keterangan</th>
       </tr>
    </thead>
      <tbody id="rekapTriwulan" class="text-white">
             <!-- Konten akan diisi lewat JS -->
    </tbody>
  </table>
</section>
  <!-- Footer -->
  <footer class="w-full bg-green-800 text-center py-3 text-sm text-gray-200 border-t border-blue-700">
    2026 | SISTEM KEUANGAN | SD NEGERI WONOKERTO | LEKSONO | sd_wonokerto@gmail.com
  </footer>
</body>
</html>
