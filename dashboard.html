<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - SD Negeri Wonokerto</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="assets/favicon.png" type="image/png">
</head>
<body class="w-full bg-blue-900 min-h-screen text-white">

  <!-- Header -->
  <header class="w-full h-40 bg-gradient-to-r from-blue-800 via-blue-700 to-blue-900 shadow-lg rounded-b-1xl">
    <!-- Logo sejajar -->
    <div class="flex justify-center items-center space-x-3">
      <img src="assets/logo_pemkab.png" alt="Logo Pemkab" class="w-12 h-12 object-contain">
      <img src="assets/logo_tutwuri.png" alt="Tutwuri" class="w-12 h-12 object-contain">
      <img src="assets/logo_kurikulum_merdeka.png" alt="Kurikulum" class="w-14 h-14 object-contain">
      <img src="assets/logo_ramah.png" alt="Ramah" class="w-14 h-14 object-contain">
      <img src="assets/logo_sekolah.png" alt="Logo Sekolah" class="w-12 h-12 object-contain">
    </div>
    <h1 class="text-2xl md:text-3xl font-extrabold text-amber-300 tracking-wide text-center">
      SISTEM KEUANGAN SD NEGERI WONOKERTO
    </h1>
  </header>

  <div class="flex">
    <!-- Sidebar -->
    <aside class="w-60 bg-blue-900 shadow-lg rounded-r-1xl p-4">
      <h2 class="text-lg font-bold text-amber-300 mb-2">Menu</h2>
      <nav class="flex flex-col space-y-3">
        <button id="menu-arkas" class="text-left px-3 py-1 hover:text-amber-300">INPUT ARKAS</button>
        <a href="#laporan-bos" class="px-3 py-1 hover:text-amber-300">LAPORAN BOS</a>
        <a href="#siplah" class="px-3 py-1 hover:text-amber-300">SIPLAH</a>
        <a href="#perubahan" class="px-3 py-1 hover:text-amber-300">PERUBAHAN</a>
      </nav>
    </aside>

    <!-- Konten utama -->
    <main class="flex-1 p-6">
      <!-- Section ARKAS (disembunyikan dulu) -->
      <section id="input-arkas" class="hidden">
        <h2 class="text-xl font-bold mb-4">Input Data ARKAS</h2>

        <!-- Area drag & drop -->
        <div id="drop-area" class="border-2 border-dashed border-gray-400 p-6 text-center rounded hover:bg-blue-700">
          <p class="mb-2">Upload file ARKAS di sini:</p>
          <input id="fileInput" type="file" accept=".xlsx,.xls,.csv,.json" class="block mx-auto mb-4">
          <p class="text-gray-500">atau drag & drop file ke area ini</p>
        </div>

        <!-- Progress bar -->
        <div id="progress-container" class="hidden mt-4">
          <div class="w-full bg-gray-200 rounded">
            <div id="progress-bar" class="bg-amber-500 text-xs leading-none py-1 text-center text-white rounded" style="width:0%">
              0%
            </div>
          </div>
        </div>

        <!-- Hasil data -->
        <div id="result" class="mt-6 hidden">
          <h3 class="text-lg font-semibold mb-2">Data ARKAS yang diinput:</h3>
          <ul id="file-list" class="list-disc pl-6 text-gray-700"></ul>
        </div>
      </section>

      <!-- Section Laporan -->
           </section>
    </main>
  </div>

     <!-- Footer -->
  <footer class="w-full bg-blue-800 text-center py-3 text-sm text-gray-200 border-t border-blue-700">
    2026 | SISTEM KEUANGAN | SD NEGERI WONOKERTO | LEKSONO | sd_wonokerto@gmail.com
  </footer>

  <!-- Library SheetJS untuk membaca file Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <!-- Script upload ARKAS -->
  <script src="js/arkas.js"></script>
</body>
</html>
