<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - SD Negeri Wonokerto</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="assets/favicon.png" type="image/png">
</head>
<body class="w-full bg-blue-900 min-h-screen text-white">
  
  <!-- Header -->
  <header class="w-full h-40 bg-gradient-to-r from-blue-800 via-blue-700 to-blue-900 shadow-lg rounded-b-1xl">
    <div class="max-w-7xl mx-auto flex flex-col items-center px-6 py-4 space-y-4">
      
      <!-- Logo sejajar -->
      <div class="flex justify-center items-center space-x-3">
        
        <!-- Logo kiri -->
        <div class="bg-white/10 rounded-lg p-0">
          <img src="assets/logo_pemkab.png" alt="Logo Pemkab" class="w-12 h-12 object-contain">
        </div>

         <!-- Logo tengah1 (persegi panjang) -->
        <img src="assets/logo_tutwuri.png" alt="Tutwuri" class="w-12 h-12 object-contain">
        
        <!-- Logo tengah2 (persegi panjang) -->
        <img src="assets/logo_kurikulum_merdeka.png" alt="Kurikulum" class="w-14 h-14 object-contain">
            
         <!-- Logo tengah3 (persegi panjang) -->
        <img src="assets/logo_ramah.png" alt="Tutwuri" class="w-14 h-14 object-contain">
        
        <!-- Logo kanan -->
        <div class="bg-white/10 rounded-lg p-0">
          <img src="assets/logo_sekolah.png" alt="Logo Sekolah" class="w-12 h-12 object-contain">
        </div>
      </div>

      <!-- Judul di header -->
      <h1 class="text-2xl md:text-3xl font-extrabold text-amber-300 tracking-wide text-center">
        SISTEM KEUANGAN SD NEGERI WONOKERTO
      </h1>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="w-60 bg-blue-900 shadow-lg rounded-r-1xl p-4">
    <h2 class="text-lg font-bold text-amber-300 mb-2">Menu</h2>
    <nav class="flex flex-col space-y-3">
      <a href="#input-rkas" class="px-3 py-1 hover:text-amber-300">INPUT RKAS</a>
      <a href="#laporan-bos" class="px-3 py-1 hover:text-amber-300">LAPORAN BOS</a>
      <a href="#siplah" class="px-3 py-1 hover:text-amber-300">SIPLAH</a>
      <a href="#perubahan" class="px-3 py-1 hover:text-amber-300">PERUBAHAN</a>
    </nav>
  </aside>

  <!-- Konten dashboard -->
  <main class="p-6">
    <!-- nanti isi tabel transaksi BOS dan navigasi kategori -->
  </main>

  <!-- Footer -->
  <footer class="w-full bg-blue-800 text-center py-3 text-sm text-gray-200 border-t border-blue-700">
    2026 | SISTEM KEUANGAN | SD NEGERI WONOKERTO | LEKSONO | sd_wonokerto@gmail.com
  </footer>
</body>
</html>
