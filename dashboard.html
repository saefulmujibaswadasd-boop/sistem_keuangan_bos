<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - SD Negeri Wonokerto</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/output.css">
</head>
<body class="w-full bg-gradient-to-r bg-blue-900 min-h-screen text-white=100">

  <!-- Header -->
  <header class="w-full h-40 bg-gradient-to-r from-blue-800 via-blue-700 to-blue-900 shadow-lg rounded-b-3xl">
    <div class="max-w-7xl mx-auto flex flex-col items-center px-6 py-4 space-y-4">

      <!-- Logo sejajar -->
    <div class="flex justify-center items-center space-x-3">

      <!-- Logo kiri -->
       <div class="bg-white/4 rounded-lg p-1">
        <img src="assets/logo_pemkab.png" alt="Logo Pemkab" class="w-20 h-10 object-contain">
       </div>
       
      <!-- Logo tengah -->
      <div class="bg-white/4 rounded-lg p-1">
       <img src="assets/ikon_merdeka_belajar.png" alt="Ikon Merdeka Belajar" class="w-50 h-10 object-contain">
      </div>

      <!-- Logo kanan -->
       <div class="bg-white/4 rounded-lg p-1">
        <img src="assets/logo_sekolah.png" alt="Logo Sekolah" class="w-20 h-10 object-contain">
       </div>
    </div>

      <!-- Judul di header -->
      <h1 class="text-2xl md:text-3xl font-extrabold text-amber-300 tracking-wide text-center">
        SISTEM KEUANGAN SD NEGERI WONOKERTO
      </h1>
    </div>
  </header>

  <!-- Konten dashboard -->
  <main class="p-6">
    <!-- nanti isi tabel transaksi BOS dan navigasi kategori -->
  </main>

    <!-- Footer -->
  <footer class="w-full bg-blue-800 text-center py-3 text-sm text-gray-200 border-t border-blue-700">
    2026 | SISTEM KEUANGAN | SD NEGERI WONOKERTO | LEKSONO  sd_wonokerto@gmail.com
  </footer>


</body>

</html>
